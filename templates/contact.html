<!DOCTYPE html>
<html>

<head>
    <title>Contact Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-lg">

        <h2 class="text-2xl font-bold text-center mb-6">Contact Support</h2>

        <form method="POST">

            <div class="mb-4">
                <label class="block text-sm font-semibold">Name</label>
                <input type="text" name="name" required class="w-full mt-1 border rounded-lg px-4 py-2">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold">Email</label>
                <input type="email" name="email" required class="w-full mt-1 border rounded-lg px-4 py-2">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold">Message</label>
                <textarea name="message" rows="4" required class="w-full mt-1 border rounded-lg px-4 py-2"></textarea>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700">
                Send Message
            </button>

        </form>

    </div>

</body>

</html>
